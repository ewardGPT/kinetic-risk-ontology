target-version = "py311"
line-length = 100
extend-exclude = [
  ".venv",
  "build",
  "dist",
  "data",
  "**/__pycache__",
  "**/node_modules",
]

[lint]
select = [
  "E",
  "F",
  "UP",
]
ignore = [
  "E501",
]

[lint.per-file-ignores]
"__init__.py" = [
  "F401",
]

[format]
quote-style = "double"
indent-style = "space"
