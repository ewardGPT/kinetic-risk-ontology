name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.6.9
      - name: ruff check
        run: ruff check .
      - name: ruff format (check)
        run: ruff format --check .

  validate:
    name: docker compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: copy .env.example as .env for compose validation
        run: cp .env.example .env
      - name: docker compose config
        run: docker compose config --quiet && docker compose config

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install kro-common
        working-directory: libs/kro_common
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: install test deps
        run: |
          pip install pytest pytest-asyncio ruff
      - name: run tests
        run: |
          PYTHONPATH=services/kinetic-risk/src:libs/kro_common/src \
            python -m pytest services/kinetic-risk/tests/ -v
